<!DOCTYPE html>
<html>
<head>
    <title>Test Partial Delivery</title>
    <meta name="csrf-token" content="test">
</head>
<body>
    <h1>Test Partial Delivery API</h1>
    
    <div id="result"></div>
    
    <script>
    // Test the API directly
    const bookingId = 22; // Change to a valid booking ID
    
    const testData = {
        items: [
            {
                booking_item_id: 1,
                delivered_quantity: 1
            }
        ],
        payment_amount: 0,
        payment_method: 'cash',
        receiver_name: 'Test Receiver',
        receiver_mobile: '03001234567',
        notes: 'Test delivery'
    };
    
    fetch('/admin/bookings/' + bookingId + '/partial-delivery', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRF-TOKEN': document.querySelector('meta[name="csrf-token"]').content
        },
        body: JSON.stringify(testData)
    })
    .then(response => response.text())
    .then(data => {
        document.getElementById('result').innerHTML = '<pre>' + data + '</pre>';
    })
    .catch(error => {
        document.getElementById('result').innerHTML = '<p style="color:red">Error: ' + error.message + '</p>';
    });
    </script>
</body>
</html>
